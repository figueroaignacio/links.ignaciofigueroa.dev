<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ignacio Figueroa | Area 51</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./styles/secret.css" />
  </head>
  <body>
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>

    <div class="terminal">
      <div class="terminal__header">
        <div class="terminal__dots">
          <div class="terminal__dot terminal__dot--red"></div>
          <div class="terminal__dot terminal__dot--yellow"></div>
          <div class="terminal__dot terminal__dot--green"></div>
        </div>
        <div class="terminal__title">GUEST@IGNACIOFIGUEROA: ~</div>
        <a href="./index.html" class="back-btn">
          <span>&larr; Exit</span>
        </a>
      </div>

      <div class="terminal__output" id="output">
        <div class="system-msg">> INITIATING DECRYPT SEQUENCE...</div>
        <div class="system-msg">
          > ACCESSING ANTIGRAVITY LINK HUB DATABASE...
        </div>
        <div class="success-msg">> SECURE LINK ESTABLISHED. WELCOME AGENT.</div>
        <div class="system-msg" style="margin-bottom: 1rem">
          Type 'help' for available commands.
        </div>
      </div>

      <div class="prompt-line">
        <span class="prompt-symbol">&lambda;</span>
        <span class="system-msg">~</span>
        <div class="input-wrapper">
          <input
            type="text"
            id="input"
            class="terminal__input"
            autofocus
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false" />
        </div>
      </div>
    </div>

    <script type="module" src="js/secret.js"></script>
  </body>
</html>
