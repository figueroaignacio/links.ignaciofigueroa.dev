<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ignacio Figueroa | Area 51</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --color-bg: #050506;
        --color-glow: rgba(99, 102, 241, 0.15);
        --color-accent: #a5b4fc;
        --color-accent-dark: #6366f1;
        --color-dim: #64748b;
        --color-text: #e2e8f0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        min-height: 100vh;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow-x: hidden;
      }

      /* CRT Scanline Effect */
      body::after {
        content: " ";
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
        background-size: 100% 4px;
        z-index: 999;
        pointer-events: none;
        opacity: 0.8;
      }

      /* Ambient Light Blobs */
      .blob {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--color-accent-dark) 0%, rgba(0, 0, 0, 0) 70%);
        opacity: 0.15;
        filter: blur(50px);
        pointer-events: none;
        z-index: 1;
      }

      .blob--1 {
        top: -10%;
        left: -10%;
      }

      .blob--2 {
        bottom: -10%;
        right: -10%;
      }

      .terminal {
        width: 100%;
        max-width: 800px;
        background: rgba(10, 10, 11, 0.7);
        border: 1px solid rgba(165, 180, 252, 0.2);
        border-radius: 0.75rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px var(--color-glow);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 1.5rem;
        z-index: 2;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .terminal__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(165, 180, 252, 0.1);
        padding-bottom: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .terminal__dots {
        display: flex;
        gap: 6px;
      }

      .terminal__dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .terminal__dot--red { background: #ef4444; }
      .terminal__dot--yellow { background: #eab308; }
      .terminal__dot--green { background: #22c55e; }

      .terminal__title {
        font-size: 0.8rem;
        color: var(--color-dim);
        font-weight: 500;
        letter-spacing: 0.05em;
      }

      .terminal__output {
        font-size: 0.85rem;
        line-height: 1.5;
        overflow-y: auto;
        max-height: 60vh;
        padding-right: 0.5rem;
      }

      /* Custom scrollbar */
      .terminal__output::-webkit-scrollbar {
        width: 6px;
      }
      .terminal__output::-webkit-scrollbar-track {
        background: transparent;
      }
      .terminal__output::-webkit-scrollbar-thumb {
        background: rgba(165, 180, 252, 0.2);
        border-radius: 3px;
      }

      .ascii-art {
        color: var(--color-accent);
        font-size: min(1.6vw, 11px);
        line-height: 1.25;
        margin: 1.5rem 0;
        white-space: pre;
        text-shadow: 0 0 5px rgba(165, 180, 252, 0.4);
        overflow-x: auto;
      }

      .prompt-line {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--color-accent);
      }

      .prompt-symbol {
        font-weight: bold;
        animation: pulse 1.5s infinite;
      }

      .input-wrapper {
        flex-grow: 1;
        position: relative;
      }

      .terminal__input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--color-text);
        font-family: inherit;
        font-size: inherit;
      }

      .terminal__input:focus {
        border: none;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--color-dim);
        text-decoration: none;
        font-size: 0.8rem;
        transition: color 0.2s;
        border: 1px solid rgba(165, 180, 252, 0.15);
        padding: 0.4rem 0.8rem;
        border-radius: 0.375rem;
        background: rgba(255, 255, 255, 0.02);
      }

      .back-btn:hover {
        color: var(--color-accent);
        border-color: var(--color-accent-dark);
        background: rgba(99, 102, 241, 0.1);
      }

      .system-msg {
        color: var(--color-dim);
      }

      .accent-msg {
        color: var(--color-accent);
      }

      .success-msg {
        color: #22c55e;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      @media (max-width: 480px) {
        .terminal {
          padding: 1rem;
        }
        .terminal__title {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>

    <div class="terminal">
      <div class="terminal__header">
        <div class="terminal__dots">
          <div class="terminal__dot terminal__dot--red"></div>
          <div class="terminal__dot terminal__dot--yellow"></div>
          <div class="terminal__dot terminal__dot--green"></div>
        </div>
        <div class="terminal__title">GUEST@IGNACIOFIGUEROA: ~</div>
        <a href="./index.html" class="back-btn">
          <span>&larr; Exit</span>
        </a>
      </div>

      <div class="terminal__output" id="output">
        <div class="system-msg">> INITIATING DECRYPT SEQUENCE...</div>
        <div class="system-msg">> ACCESSING ANTIGRAVITY LINK HUB DATABASE...</div>
        <div class="success-msg">> SECURE LINK ESTABLISHED. WELCOME AGENT.</div>
        <div class="system-msg" style="margin-bottom: 1rem;">Type 'help' for available commands.</div>
      </div>

      <div class="prompt-line">
        <span class="prompt-symbol">&lambda;</span>
        <span class="system-msg">~</span>
        <div class="input-wrapper">
          <input
            type="text"
            id="input"
            class="terminal__input"
            autofocus
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false" />
        </div>
      </div>
    </div>

    <script>
      const outputDiv = document.getElementById('output');
      const inputEl = document.getElementById('input');

      // ASCII arts
      const rocketArt = `
           .
          / \\
         /   \\
        /     \\
       /       \\
      /         \\
     |   ( I )   |
     |   ( G )   |
     |   ( N )   |
     |   ( A )   |
     |   ( C )   |
     |   ( I )   |
     |   ( O )   |
    /|   /   \\   |\\
   / |  /     \  | \\
  /  | /       \\ |  \\
 |  /|/         \\|   |
 | / |           |   |
 |/  |           |   |
     |  _______  |
     ( /       \\ )
      \\         /
       \\       /
        \\     /
         \\   /
          \\ /
           V
      `;

      const alienArt = `
         .-''''-.
        /  _  _  \\
       |  (o)(o)  |
       |    __    |
       |   /  \\   |
        \\  \\__/  /
         '-____-'
      `;

      const welcomeMsg = `
    _   _   _  _____  _  ____  ____  ____  _   _   _  _ 
   / \\ / \\ / \\/__ __\\/ \\/  __\\/  _ \\/  _ \\/ \\ / \\ / \\/ \\
   | | | | | |  / \\  | ||  \\/|| / \\|| | \\|| | | | | || |
   | | | | | |  | |  | ||  __/| |-|||| |_/|| \\_/| | \\_/|
   \\_/ \\_/ \\_/  \\_/  \\_/\\_/   \\_/ \\|\\____/\\____/ \\____/
      `;

      // Print first art on startup after a minor delay
      setTimeout(() => {
        printText(welcomeMsg, 'ascii-art');
      }, 500);

      // Focus input on body click
      document.body.addEventListener('click', () => {
        inputEl.focus();
      });

      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const rawInput = inputEl.value;
          const cmd = rawInput.trim().toLowerCase();
          inputEl.value = '';

          // Print prompt + command
          printLine(`λ ~ ${rawInput}`, 'accent-msg');

          if (cmd) {
            handleCommand(cmd);
          }
        }
      });

      function handleCommand(cmd) {
        const args = cmd.split(' ');
        const primaryCmd = args[0];

        switch (primaryCmd) {
          case 'help':
            printLine('Available Commands:', 'success-msg');
            printLine('  art      - Display the secret rocket ASCII art');
            printLine('  alien    - Reveal extraterrestrial presence');
            printLine('  about    - Info about the developer and Antigravity');
            printLine('  matrix   - Enter the matrix code simulation');
            printLine('  clear    - Clear the terminal screen');
            printLine('  exit     - Return to the normal world');
            break;
          case 'art':
            printText(rocketArt, 'ascii-art');
            break;
          case 'alien':
            printText(alienArt, 'ascii-art');
            printLine('Greetings, human. We come in peace... and clean code.', 'success-msg');
            break;
          case 'about':
            printLine('Ignacio Figueroa is a Fullstack & AI Developer who builds blazing-fast and intelligent systems.', 'system-msg');
            printLine('This secret area is powered by the Antigravity AI pair programming engine.', 'system-msg');
            break;
          case 'matrix':
            printLine('Entering the matrix... (type any key to stop)', 'success-msg');
            startMatrixEffect();
            break;
          case 'clear':
            outputDiv.innerHTML = '';
            break;
          case 'exit':
            window.location.href = './index.html';
            break;
          default:
            printLine(`Command not found: '${primaryCmd}'. Type 'help' for a list of commands.`, 'system-msg');
        }
        
        // Scroll to bottom
        setTimeout(() => {
          outputDiv.scrollTop = outputDiv.scrollHeight;
        }, 10);
      }

      function printLine(text, className = '') {
        const div = document.createElement('div');
        div.textContent = text;
        if (className) div.className = className;
        outputDiv.appendChild(div);
      }

      function printText(text, className = '') {
        const pre = document.createElement('pre');
        pre.textContent = text;
        if (className) pre.className = className;
        outputDiv.appendChild(pre);
      }

      // Matrix effect simulation
      let matrixInterval;
      function startMatrixEffect() {
        // Disable typing in main input temporarily
        inputEl.disabled = true;
        
        const matrixDiv = document.createElement('pre');
        matrixDiv.className = 'ascii-art';
        matrixDiv.style.color = '#22c55e';
        matrixDiv.style.textShadow = '0 0 5px rgba(34, 197, 94, 0.8)';
        outputDiv.appendChild(matrixDiv);

        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@&%*+=-/\\|';
        const cols = 40;
        let rows = 0;

        matrixInterval = setInterval(() => {
          let line = '';
          for (let i = 0; i < cols; i++) {
            line += Math.random() > 0.85 ? chars[Math.floor(Math.random() * chars.length)] : ' ';
          }
          matrixDiv.textContent += line + '\n';
          rows++;
          outputDiv.scrollTop = outputDiv.scrollHeight;

          if (rows > 25) {
            stopMatrix();
          }
        }, 100);

        function stopMatrix() {
          clearInterval(matrixInterval);
          inputEl.disabled = false;
          inputEl.focus();
          printLine('Matrix simulation terminated.', 'system-msg');
        }

        // Allow stopping early by typing/clicking
        const stopHandler = () => {
          stopMatrix();
          document.removeEventListener('keydown', stopHandler);
        };
        document.addEventListener('keydown', stopHandler);
      }
    </script>
  </body>
</html>
